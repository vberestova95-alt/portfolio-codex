<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function redirectToSpaEntry() {
        const redirectPath =
          window.location.pathname + window.location.search + window.location.hash;

        window.sessionStorage.setItem('spa-redirect-path', redirectPath);
        window.location.replace('/');
      })();
    </script>
  </head>
  <body></body>
</html>
