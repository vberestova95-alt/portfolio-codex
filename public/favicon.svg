<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="favicon-base" x1="12" y1="8" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2e2622" />
      <stop offset="0.52" stop-color="#241e1d" />
      <stop offset="1" stop-color="#171717" />
    </linearGradient>
    <filter id="favicon-blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5.5" />
    </filter>
    <filter id="favicon-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.4" flood-color="#120f10" flood-opacity="0.55" />
    </filter>
    <clipPath id="favicon-clip">
      <rect x="2" y="2" width="60" height="60" rx="18" />
    </clipPath>
  </defs>

  <g clip-path="url(#favicon-clip)">
    <rect x="2" y="2" width="60" height="60" rx="18" fill="url(#favicon-base)" />
    <circle cx="16" cy="38" r="15" fill="#da523a" fill-opacity="0.82" filter="url(#favicon-blur)" />
    <circle cx="36" cy="34" r="17" fill="#c54a4a" fill-opacity="0.72" filter="url(#favicon-blur)" />
    <circle cx="24" cy="16" r="14" fill="#da893a" fill-opacity="0.88" filter="url(#favicon-blur)" />
  </g>

  <rect x="2.5" y="2.5" width="59" height="59" rx="17.5" stroke="white" stroke-opacity="0.08" />
  <text
    x="32"
    y="36"
    fill="#f6efe8"
    filter="url(#favicon-shadow)"
    font-family="Arial, Helvetica, sans-serif"
    font-size="28"
    font-weight="700"
    letter-spacing="-1.25"
    text-anchor="middle"
  >
    VB
  </text>
</svg>
